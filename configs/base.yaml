# ── Shared defaults ─────────────────────────────────────────────────────────────
# Inherit from this file in experiment configs via OmegaConf merging.

model:
  # DINOv2 backbone variant: dinov2-small | dinov2-base | dinov2-large | dinov2-giant
  backbone_name: "facebook/dinov2-large"
  # Number of object queries for Mask2Former transformer decoder
  num_queries: 100
  # Feature pyramid output strides from backbone intermediate layers
  feature_strides: [4, 8, 16, 32]
  # Number of encoder layers in the pixel decoder (MSDeformAttn in pure PyTorch)
  encoder_layers: 6
  # Number of decoder layers in the transformer decoder
  decoder_layers: 10
  # Hidden dimensionality of the pixel decoder
  hidden_dim: 256
  # Enforce input projection when backbone output dim != hidden_dim
  enforce_input_projection: true

training:
  seed: 42
  # DGX Spark has 128 GB unified memory; effective batch = batch_size * grad_accum_steps
  batch_size: 4
  grad_accum_steps: 4          # effective batch = 16
  num_epochs: 50
  warmup_epochs: 5
  base_lr: 1.0e-4              # scaled by effective batch / 16
  weight_decay: 0.05
  # AdamW betas
  adam_beta1: 0.9
  adam_beta2: 0.999
  # LR scheduler: cosine | multistep
  lr_scheduler: cosine
  # Mixed precision: bf16 recommended for Blackwell (native BF16 support)
  mixed_precision: bf16
  # Max gradient norm for clipping
  max_grad_norm: 1.0
  # Log every N steps
  log_every: 50
  # Checkpoint every N epochs
  save_every: 5
  output_dir: outputs/

data:
  # Image size fed to the model (H, W)
  image_size: [512, 512]
  # Number of DataLoader workers — keep low on DGX Spark (ARM CPU, limited cores for DL)
  num_workers: 4
  pin_memory: false            # UMA: pin_memory is a no-op but set false to avoid overhead
  # Random horizontal flip probability
  flip_prob: 0.5
  # Colour jitter strength (0 = off)
  color_jitter: 0.4
  # Ignore index for background pixels (used by connected-component instance conversion)
  ignore_index: 255

evaluation:
  # IoU threshold for COCO AP matching
  iou_thresholds: [0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90, 0.95]
  # Also compute Sewer-ML classification metrics from instance predictions
  compute_sewerml_metrics: false

logging:
  project: side-train
  run_name: base
  # Set to "" to disable W&B
  wandb_entity: ""
